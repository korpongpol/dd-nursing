<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDdt1rc23hxWNQFXDhp1we4rfN-lW0wh60",
  authDomain: "dd-data-88eb0.firebaseapp.com",
  databaseURL: "https://dd-data-88eb0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dd-data-88eb0",
  storageBucket: "dd-data-88eb0.firebasestorage.app",
  messagingSenderId: "586975391632",
  appId: "1:586975391632:web:3568fb7c4a3f694953cd15"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const CAT_META = {
  med:  {label:"ยา/อุปกรณ์การแพทย์", icon:"💊", color:"#b82c1f", bg:"#fde8e6"},
  cloth:{label:"ผ้าอ้อม/เสื้อผ้า",    icon:"👕", color:"#2856b8", bg:"#e8f0fe"},
  food: {label:"อาหารเสริม/นม",       icon:"🥛", color:"#2a7a1a", bg:"#e8f5e0"},
  pers: {label:"ของใช้ส่วนตัว",       icon:"🧴", color:"#9a5e08", bg:"#fef3e0"},
};

const DEFAULT_CATALOG = [
  {id:"c01",name:"ผ้าอ้อมผู้ใหญ่ Size M",   type:"cloth",unit:"แผ่น",price:25},
  {id:"c02",name:"ผ้าอ้อมผู้ใหญ่ Size L",   type:"cloth",unit:"แผ่น",price:27},
  {id:"c03",name:"ผ้าอ้อมผู้ใหญ่ Size XL",  type:"cloth",unit:"แผ่น",price:29},
  {id:"c04",name:"กางเกงอ้อมผู้ใหญ่ M",      type:"cloth",unit:"ชิ้น",price:35},
  {id:"c05",name:"กางเกงอ้อมผู้ใหญ่ L",      type:"cloth",unit:"ชิ้น",price:37},
  {id:"c06",name:"เสื้อผู้ป่วย (เปิดหน้า)",   type:"cloth",unit:"ตัว", price:150},
  {id:"c07",name:"ผ้าขนหนู",                  type:"cloth",unit:"ผืน", price:80},
  {id:"m01",name:"ยาพาราเซตามอล 500 mg",      type:"med",  unit:"เม็ด",price:2},
  {id:"m02",name:"ยาลดกรด",                   type:"med",  unit:"เม็ด",price:3},
  {id:"m03",name:"ยาแก้ปวด",                  type:"med",  unit:"เม็ด",price:3},
  {id:"m04",name:"ครีมทาผิว (ป้องกันแผลกดทับ)",type:"med", unit:"หลอด",price:120},
  {id:"m05",name:"ผ้าก๊อซ / ผ้าพันแผล",       type:"med",  unit:"ม้วน",price:25},
  {id:"m06",name:"แอลกอฮอล์ 70%",             type:"med",  unit:"ขวด",price:45},
  {id:"m07",name:"สายสวนปัสสาวะ",             type:"med",  unit:"ชิ้น",price:80},
  {id:"f01",name:"นมผงผู้สูงอายุ",             type:"food", unit:"กล่อง",price:350},
  {id:"f02",name:"อาหารเสริม (Ensure)",        type:"food", unit:"กล่อง",price:280},
  {id:"f03",name:"วิตามิน C",                  type:"food", unit:"เม็ด",price:3},
  {id:"f04",name:"วิตามินรวม",                 type:"food", unit:"เม็ด",price:4},
  {id:"p01",name:"แปรงสีฟัน",                  type:"pers", unit:"ด้าม",price:35},
  {id:"p02",name:"ยาสีฟัน",                    type:"pers", unit:"หลอด",price:55},
  {id:"p03",name:"สบู่",                        type:"pers", unit:"ก้อน",price:30},
  {id:"p04",name:"แชมพู",                       type:"pers", unit:"ขวด",price:90},
  {id:"p05",name:"โลชั่นทาตัว",                type:"pers", unit:"ขวด",price:120},
];

let catalog = DEFAULT_CATALOG;
let allCustomers = [];
let filteredCustomers = [];
let selectedCustId = "";
let selectedMonth  = "";
let reqEntries = [];
let activeBranch = "";
let custSearch = "";
let itemSearch = "";
let activeType = "cloth";

const now = new Date();
const todayISO = now.toISOString().split("T")[0];

async function loadData() {
  showStatus("กำลังโหลดข้อมูล...", "info");
  try {
    const snap = await get(ref(db));
    if (snap.exists()) {
      const data = snap.val();
      if (data.customers) {
        allCustomers = Object.values(data.customers).filter(c => !c.discharged);
        allCustomers.sort((a,b) => a.name.localeCompare(b.name,"th"));
      }
      if (data.catalog) catalog = Object.values(data.catalog);
    }
    buildMonthSelect();
    renderCustList();
    renderItems();
    showStatus("พร้อมใช้งาน ✓", "ok");
    setTimeout(() => { document.getElementById("status").style.display="none"; }, 2000);
  } catch(e) {
    showStatus("ไม่สามารถเชื่อมต่อ Firebase: " + e.message, "err");
  }
}

function buildMonthSelect() {
  const sel = document.getElementById("month-sel");
  const thaiM = ["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  // Fixed range: Apr–Dec 2026 (เม.ย.–ธ.ค. 2569)
  const months = [];
  for (let mo = 4; mo <= 12; mo++) {
    months.push("2026-" + String(mo).padStart(2,"0"));
  }
  const curRaw = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const cur = months.includes(curRaw) ? curRaw : "2026-04";
  sel.innerHTML = months.map(m => {
    const [y,mo] = m.split("-");
    return `<option value="${m}" ${m===cur?"selected":""}>${thaiM[+mo]} ${+y+543}</option>`;
  }).join("");
  selectedMonth = cur;
}

// ---- Branch filter ----
function setBranch(b) {
  activeBranch = b;
  document.querySelectorAll(".branch-btn").forEach(el => {
    el.classList.toggle("active", el.dataset.branch === b);
  });
  renderCustList();
}

// ---- Customer search & list ----
function onCustSearch(v) {
  custSearch = v.trim().toLowerCase();
  renderCustList();
}

function renderCustList() {
  let list = allCustomers;
  if (activeBranch) list = list.filter(c => c.branch === activeBranch);
  if (custSearch)   list = list.filter(c =>
    c.name.toLowerCase().includes(custSearch) ||
    c.id.toLowerCase().includes(custSearch)
  );
  filteredCustomers = list;

  const el = document.getElementById("cust-list");
  if (list.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:16px;color:#999;font-size:13px">ไม่พบลูกค้า</div>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="cust-row ${c.id===selectedCustId?"selected":""}" onclick="selectCust('${c.id}')">
      <div style="flex:1">
        <span style="font-weight:500;font-size:13px">${c.name}</span>
        <span style="font-size:11px;color:#888;margin-left:6px">${c.id}</span>
      </div>
      <span class="branch-tag b${c.branch?.slice(-1)}">${c.branch||""}</span>
    </div>`).join("");
}

function selectCust(id) {
  selectedCustId = id;
  const c = allCustomers.find(x=>x.id===id);
  reqEntries = [];
  renderCustList();
  renderItems();
  renderSaved();
  document.getElementById("form-section").style.display = "block";
  document.getElementById("cust-banner").innerHTML = `
    <b>${c.name}</b>
    <span style="font-size:12px;color:#666;margin-left:8px">${c.id}</span>
    <span class="branch-tag b${c.branch?.slice(-1)}" style="margin-left:6px">${c.branch||""}</span>`;
  document.getElementById("month-sel").onchange = function(){
    selectedMonth = this.value;
    reqEntries = [];
    renderItems();
    renderSaved();
  };
}

// ---- Item search ----
function onItemSearch(v) {
  itemSearch = v.trim().toLowerCase();
  renderItems();
}

function setTab(type) {
  activeType = type;
  itemSearch = "";
  document.getElementById("item-search").value = "";
  document.querySelectorAll(".cat-tab").forEach(t => t.classList.toggle("active", t.dataset.type===type));
  renderItems();
}

function renderItems() {
  let items = itemSearch
    ? catalog.filter(c => c.name.toLowerCase().includes(itemSearch) || (c.note||"").toLowerCase().includes(itemSearch))
    : catalog.filter(c => c.type === activeType);

  const meta = CAT_META[activeType];
  const titleEl = document.getElementById("items-title");
  titleEl.textContent = itemSearch ? `🔍 ผลการค้นหา "${itemSearch}"` : `${meta.icon} ${meta.label}`;

  if (items.length === 0) {
    document.getElementById("items-list").innerHTML = `<div style="text-align:center;padding:20px;color:#999;font-size:13px">ไม่พบรายการ</div>`;
    return;
  }

  document.getElementById("items-list").innerHTML = items.map(item => {
    const m = CAT_META[item.type] || meta;
    const entries = reqEntries.filter(e=>e.itemId===item.id);
    const hasEntries = entries.length > 0;
    const entryRows = entries.map((e,ei) => `
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px;padding:5px 8px;background:#fff;border-radius:6px;border:1px solid #e0dbd2">
        <span style="font-size:11px;color:#999;min-width:16px">${ei+1}.</span>
        <input type="date" value="${e.date}" onchange="updateEntry('${item.id}',${ei},'date',this.value)"
          style="flex:1;padding:4px 6px;border:1px solid #e0dbd2;border-radius:5px;font-size:12px">
        <button onclick="adjEntry('${item.id}',${ei},-1)" style="width:26px;height:26px;border:1px solid #ccc;border-radius:5px;cursor:pointer;background:#fff;font-size:15px">−</button>
        <input type="number" min="1" value="${e.qty}" onchange="updateEntry('${item.id}',${ei},'qty',this.value)"
          style="width:50px;padding:4px 6px;border:1px solid #e0dbd2;border-radius:5px;font-size:13px;text-align:center">
        <button onclick="adjEntry('${item.id}',${ei},1)" style="width:26px;height:26px;border:1px solid #1a6b4a;border-radius:5px;cursor:pointer;background:#e8f5ee;font-size:15px;color:#1a6b4a">+</button>
        <span style="font-size:11px;color:#999;min-width:28px">${item.unit}</span>
        <button onclick="removeEntry('${item.id}',${ei})" style="width:24px;height:24px;border:1px solid #f5b8b0;border-radius:5px;cursor:pointer;font-size:13px;color:#c0392b;background:#fdf0ee">×</button>
      </div>`).join("");

    return `<div style="padding:8px 4px;border-bottom:1px solid #f0ede8;${hasEntries?"background:#f0fbf5;border-radius:8px;padding:8px;margin:2px 0":""}">
      <div style="display:flex;align-items:center;gap:8px">
        ${itemSearch ? `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${m.bg};color:${m.color};font-weight:500">${m.icon}</span>` : ""}
        <span style="flex:1;font-size:13px;font-weight:${hasEntries?"600":"400"}">${item.name}</span>
        ${hasEntries ? `<span style="font-size:11px;color:#1a6b4a;font-weight:600">✓ ${entries.reduce((s,e)=>s+e.qty,0)} ${item.unit}</span>` : ""}
        <button onclick="addEntry('${item.id}')"
          style="padding:4px 12px;border:1px solid #1a6b4a;border-radius:5px;cursor:pointer;font-size:12px;color:#1a6b4a;background:#e8f5ee;white-space:nowrap">+ เบิก</button>
      </div>
      ${entryRows}
    </div>`;
  }).join("");
}

function addEntry(itemId) {
  reqEntries.push({ itemId, qty:1, date:todayISO });
  renderItems(); renderSaved();
}
function updateEntry(itemId, ei, field, val) {
  const entries = reqEntries.filter(e=>e.itemId===itemId);
  if (!entries[ei]) return;
  const ri = reqEntries.indexOf(entries[ei]);
  reqEntries[ri][field] = field==="qty" ? Math.max(1,parseInt(val)||1) : val;
  renderSaved();
}
function adjEntry(itemId, ei, delta) {
  const entries = reqEntries.filter(e=>e.itemId===itemId);
  if (!entries[ei]) return;
  const ri = reqEntries.indexOf(entries[ei]);
  reqEntries[ri].qty = Math.max(1,(reqEntries[ri].qty||1)+delta);
  renderItems(); renderSaved();
}
function removeEntry(itemId, ei) {
  const entries = reqEntries.filter(e=>e.itemId===itemId);
  if (!entries[ei]) return;
  reqEntries.splice(reqEntries.indexOf(entries[ei]),1);
  renderItems(); renderSaved();
}

function renderSaved() {
  const el = document.getElementById("saved-list");
  if (reqEntries.length===0) {
    el.innerHTML=`<div style="color:#999;font-size:13px;text-align:center;padding:10px">ยังไม่มีรายการ</div>`;
    return;
  }
  const byType={};
  reqEntries.forEach(e => {
    const item = catalog.find(x=>x.id===e.itemId);
    if (!item) return;
    if (!byType[item.type]) byType[item.type]=[];
    byType[item.type].push({...item, qty:e.qty, date:e.date});
  });
  el.innerHTML = Object.entries(byType).map(([type,items]) => {
    const m = CAT_META[type];
    return `<div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:#666;margin-bottom:4px">${m.icon} ${m.label}</div>
      ${items.map(i=>`
        <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid #f0ede8;font-size:13px">
          <span>${i.name}</span>
          <span style="color:#666;font-size:11px;margin:0 8px">${fmtDate(i.date)}</span>
          <span style="font-weight:600;font-family:monospace">${i.qty} ${i.unit}</span>
        </div>`).join("")}
    </div>`;
  }).join("");
}

function fmtDate(iso) {
  if(!iso) return "";
  const m=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const [y,mo,d]=iso.split("-");
  return `${parseInt(d)} ${m[parseInt(mo)]} ${parseInt(y)+543}`;
}

async function saveRequisition() {
  if (!selectedCustId) { alert("กรุณาเลือกลูกค้า"); return; }
  if (!selectedMonth)  { alert("กรุณาเลือกเดือน");  return; }
  if (reqEntries.length===0) { alert("ยังไม่มีรายการเบิก"); return; }
  const btn = document.getElementById("save-btn");
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  showStatus("กำลังบันทึก...", "info");
  try {
    const key = selectedCustId.replace(/\//g,"_") + "_" + selectedMonth;
    const payload = reqEntries.map(e=>({itemId:e.itemId, qty:e.qty, savedAt:e.date, staffSaved:true}));
    await set(ref(db,"requisitions/"+key), payload);
    showStatus("✓ บันทึกสำเร็จแล้วค่ะ", "ok");
    reqEntries=[];
    renderItems(); renderSaved();
    btn.textContent="✓ บันทึกแล้ว";
    setTimeout(()=>{ btn.disabled=false; btn.textContent="💾 บันทึกการเบิก"; }, 3000);
  } catch(e) {
    showStatus("บันทึกไม่สำเร็จ: "+e.message, "err");
    btn.disabled=false; btn.textContent="💾 บันทึกการเบิก";
  }
}

function showStatus(msg,type) {
  const el=document.getElementById("status");
  el.textContent=msg; el.style.display="block";
  el.style.background=type==="ok"?"#e8f5ee":type==="err"?"#fdf0ee":"#edf4fd";
  el.style.color=type==="ok"?"#1a6b4a":type==="err"?"#c0392b":"#1a5c9e";
  el.style.borderColor=type==="ok"?"#b0d8c0":type==="err"?"#f5b8b0":"#b0cef5";
  if(type==="ok") setTimeout(()=>el.style.display="none", 3000);
}

window.setBranch=setBranch; window.onCustSearch=onCustSearch;
window.selectCust=selectCust; window.setTab=setTab;
window.onItemSearch=onItemSearch; window.addEntry=addEntry;
window.updateEntry=updateEntry; window.adjEntry=adjEntry;
window.removeEntry=removeEntry; window.saveRequisition=saveRequisition;

loadData();
</script>

<body>

    <div><h1>DD Nursing Home</h1><p>ระบบบันทึกเบิกของ — พนักงาน</p></div>
  </div>

  <div id="status"></div>

  <!-- Step 1: เลือกลูกค้า -->
  <div class="card">
    <div class="card-title">1. เลือกลูกค้า</div>
    <!-- Branch filter -->
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="branch-btn active" data-branch="" onclick="setBranch('')">ทั้งหมด</button>
      <button class="branch-btn" data-branch="สาขา 1" onclick="setBranch('สาขา 1')">สาขา 1</button>
      <button class="branch-btn" data-branch="สาขา 2" onclick="setBranch('สาขา 2')">สาขา 2</button>
      <button class="branch-btn" data-branch="สาขา 3" onclick="setBranch('สาขา 3')">สาขา 3</button>
    </div>
    <!-- Customer search -->
    <input type="text" class="search-box" placeholder="🔍 ค้นหาชื่อหรือรหัสลูกค้า..." oninput="onCustSearch(this.value)">
    <!-- Customer list -->
    <div class="cust-list" id="cust-list">
      <div style="text-align:center;padding:16px;color:#999;font-size:13px">กำลังโหลด...</div>
    </div>
  </div>

  <!-- Step 2: เลือกเดือน + รายการเบิก -->
  <div id="form-section">
    <div class="card">
      <div class="card-title">2. เดือนที่เบิก</div>
      <div id="cust-banner" class="cust-banner"></div>
      <select class="month-sel" id="month-sel"></select>
    </div>

    <div class="card">
      <div class="card-title">3. รายการที่ต้องการเบิก</div>
      <!-- Category tabs -->
      <div class="cat-tabs">
        <button class="cat-tab active" data-type="cloth" onclick="setTab('cloth')">👕 ผ้าอ้อม</button>
        <button class="cat-tab" data-type="med"   onclick="setTab('med')">💊 ยา/อุปกรณ์</button>
        <button class="cat-tab" data-type="food"  onclick="setTab('food')">🥛 อาหารเสริม</button>
        <button class="cat-tab" data-type="pers"  onclick="setTab('pers')">🧴 ของใช้ส่วนตัว</button>
      </div>
      <!-- Item search -->
      <div class="item-search-wrap">
        <input type="text" id="item-search" class="item-search" placeholder="ค้นหารายการของ เช่น ผ้าอ้อม, ยา..." oninput="onItemSearch(this.value)">
      </div>
      <div class="items-title" id="items-title">👕 ผ้าอ้อม/เสื้อผ้า</div>
      <div id="items-list"></div>
    </div>

    <!-- Step 3: สรุปและบันทึก -->
    <div class="card">
      <div class="card-title">4. สรุปรายการที่จะเบิก</div>
      <div id="saved-list"></div>
      <button class="save-btn" id="save-btn" onclick="saveRequisition()" style="margin-top:12px">💾 บันทึกการเบิก</button>
    </div>
  </div>

  <div style="text-align:center;font-size:11px;color:#bbb;padding:6px 0 14px">
    DD Nursing Home · ระบบพนักงาน · ข้อมูลส่งให้แอดมินทันที
